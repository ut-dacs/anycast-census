name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild stats-history.json from all stats files
        run: |
          python3 - << 'PYEOF'
          import json, re, glob

          pattern = re.compile(
              r'ICMPv4 GCD nodes:\s*([\d,]+).*?'
              r'ICMPv6 GCD nodes:\s*([\d,]+).*?'
              r'Anycast-based ICMPv4:\s*([\d,]+).*?'
              r'Anycast-based TCPv4:\s*([\d,]+).*?'
              r'Anycast-based (?:DNS|UDP)v4:\s*([\d,]+).*?'
              r'GCD-based ICMPv4:\s*([\d,]+).*?'
              r'GCD-based TCPv4:\s*([\d,]+).*?'
              r'Anycast-based ICMPv6:\s*([\d,]+).*?'
              r'Anycast-based TCPv6:\s*([\d,]+).*?'
              r'Anycast-based (?:DNS|UDP)v6:\s*([\d,]+).*?'
              r'GCD-based ICMPv6:\s*([\d,]+).*?'
              r'GCD-based TCPv6:\s*([\d,]+)',
              re.DOTALL
          )

          files = sorted(glob.glob('[0-9][0-9][0-9][0-9]/[0-9][0-9]/[0-9][0-9]/stats'))
          result = {k: [] for k in ['dates','vp4','vp6','ab_icmp4','ab_tcp4','ab_dns4',
                                     'gcd_icmp4','gcd_tcp4','ab_icmp6','ab_tcp6','ab_dns6',
                                     'gcd_icmp6','gcd_tcp6']}
          skipped = 0
          for f in files:
              parts = f.split('/')
              date = f'{parts[0]}-{parts[1]}-{parts[2]}'
              try:
                  m = pattern.search(open(f).read())
                  if not m:
                      skipped += 1
                      continue
                  g = [int(x.replace(',', '')) for x in m.groups()]
                  result['dates'].append(date)
                  result['vp4'].append(g[0]);     result['vp6'].append(g[1])
                  result['ab_icmp4'].append(g[2]); result['ab_tcp4'].append(g[3]); result['ab_dns4'].append(g[4])
                  result['gcd_icmp4'].append(g[5]); result['gcd_tcp4'].append(g[6])
                  result['ab_icmp6'].append(g[7]); result['ab_tcp6'].append(g[8]); result['ab_dns6'].append(g[9])
                  result['gcd_icmp6'].append(g[10]); result['gcd_tcp6'].append(g[11])
              except Exception as e:
                  print(f'  Error {date}: {e}')
                  skipped += 1
          print(f'Parsed {len(result["dates"])} dates, {skipped} skipped')
          if result["dates"]:
              print(f'Range: {result["dates"][0]} → {result["dates"][-1]}')
          with open('docs/stats-history.json', 'w') as out:
              json.dump(result, out, separators=(',', ':'))
          PYEOF

      - name: Build ASN names dataset from CAIDA
        run: |
          python3 - << 'PYEOF'
          import json
          import urllib.request
          import gzip
          import io
          from datetime import datetime, timedelta

          asn_data = {}
          base_url = "https://publicdata.caida.org/datasets/as-organizations/"

          # Try recent dates to find available CAIDA data
          today = datetime.now()
          found = False

          for days_back in range(30):
              date = today - timedelta(days=days_back)
              date_str = date.strftime("%Y%m%d")
              url = f"{base_url}{date_str}.as-org2info.jsonl.gz"

              try:
                  print(f"  Trying CAIDA {date_str}...", end=" ", flush=True)

                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=10) as response:
                      with gzip.GzipFile(fileobj=io.BytesIO(response.read())) as gz:
                          lines = gz.read().decode('utf-8').strip().split('\n')

                          for line in lines:
                              if not line.strip():
                                  continue
                              try:
                                  obj = json.loads(line)
                                  asn = str(obj.get('asn', ''))
                                  name = obj.get('name', '').strip()

                                  if asn and name:
                                      asn_data[asn] = name
                              except:
                                  pass

                  print(f"✅ Found {len(asn_data)} ASNs")
                  found = True
                  break

              except (urllib.error.URLError, urllib.error.HTTPError):
                  print("not found")
              except Exception as e:
                  print(f"error: {e}")

          if not found:
              print(f"  ❌ Could not fetch CAIDA data")
              print(f"✅ Created empty ASN names dataset")
          else:
              # Write the ASN names JSON
              with open('docs/asn-names.json', 'w') as f:
                  json.dump(asn_data, f, separators=(',', ':'))
              print(f"✅ Created ASN names dataset with {len(asn_data)} entries from CAIDA")

          PYEOF

      - name: Build prefix history binary files
        run: |
          pip install duckdb numpy pandas --quiet
          python3 docs/scripts/build_prefix_history.py

      - name: Copy web files to root for serving
        run: cp -r docs/. .

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github'
          # peaceiris/actions-gh-pages adds .nojekyll automatically
